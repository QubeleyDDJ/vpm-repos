name: Build VPM Repository

on:
  push:
    branches:
      - main
    paths:
      - 'Packages/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Checkout vpm-repo-action
        uses: actions/checkout@v4
        with:
          repository: anatawa12/vpm-repo-action
          path: vpm-repo-action

      - name: Build index.json
        run: |
          dotnet run --project vpm-repo-action/vpm-repo-action.csproj -- Packages

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "Update index.json"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main