name: VPM Repo Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 外部アクションを使わず、公式バイナリを直接取得
      - name: Setup vrc-get
        run: |
          curl -L https://github.com/vrc-get/vrc-get/releases/latest/download/vrc-get-x86_64-unknown-linux-musl -o vrc-get
          chmod +x vrc-get

      # 2. その場でカタログ(index.json)を作成
      - name: Generate index.json
        run: |
          ./vrc-get vpm repo make . --package Packages

      # 3. 生成物をPages用に保存
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4