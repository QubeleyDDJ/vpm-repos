name: VPM Repo Update

on:
  push:
    branches:
      - main  # mainにプッシュされたら実行
  workflow_dispatch: # 手動実行も可能にする

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # VPM用のカタログ(index.json)を自動生成/更新するアクション
      # 複数のツールがあっても自動で検知してくれます
      - name: Update VPM Repo
        uses: vrc-get/vpm-specs-action@v0.1
        with:
          packages: Packages # パッケージが入っているフォルダを指定

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # カタログファイルをPages用にアップロード

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
