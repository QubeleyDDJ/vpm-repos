name: VPM Repo Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vrc-getを直接ダウンロード（リンクを修正し、失敗時にエラーを出すよう厳格化）
      - name: Install vrc-get
        run: |
          curl -fsSL https://github.com/vrc-get/vrc-get/releases/latest/download/vrc-get-x86_64-unknown-linux-musl -o vrc-get
          chmod +x vrc-get

      # index.jsonの生成
      - name: Build Repo
        run: |
          ./vrc-get vpm repo make . --package Packages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4